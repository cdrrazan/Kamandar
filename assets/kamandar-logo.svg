  <!-- bowstring -->
  <path d="M100 32 L100 224" fill="none" stroke="#2a3140" stroke-width="7" stroke-linecap="round"/>
  <!-- arrow shaft -->
  <path d="M70 128 L210 128" fill="none" stroke="#5b54e6" stroke-width="11" stroke-linecap="round"/>
  <!-- arrowhead -->
